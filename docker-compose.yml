version: '3.8'

services:
  pakmaatje:
    build: .
    container_name: pakmaatje
    restart: unless-stopped
    user: "0:0"
    ports:
      - "3000:3000"
    volumes:
      # Map the SQLite database file to a persistent volume on Synology
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    # Important: Automatically push schema on startup if dev.db doesn't exist
    command: sh -c "npx prisma@5.22.0 db push --skip-generate && node server.js"
